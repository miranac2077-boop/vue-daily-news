<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#shine)"/>

  <!-- Newspaper / document shape -->
  <rect x="12" y="15" width="28" height="34" rx="3" fill="white" opacity="0.95"/>
  <rect x="12" y="15" width="28" height="8" rx="3" fill="white" opacity="0.95"/>
  <!-- Header bar dark -->
  <rect x="12" y="15" width="28" height="8" rx="3" fill="#6366f1" opacity="0.7"/>

  <!-- Text lines on newspaper -->
  <rect x="16" y="27" width="20" height="2.5" rx="1.2" fill="#6366f1" opacity="0.5"/>
  <rect x="16" y="32" width="16" height="2" rx="1" fill="#94a3b8" opacity="0.6"/>
  <rect x="16" y="36.5" width="18" height="2" rx="1" fill="#94a3b8" opacity="0.6"/>
  <rect x="16" y="41" width="13" height="2" rx="1" fill="#94a3b8" opacity="0.5"/>

  <!-- Signal / broadcast arcs (top-right, overlapping paper) -->
  <!-- Center dot -->
  <circle cx="46" cy="28" r="2.5" fill="#a5f3fc"/>
  <!-- Arc 1 -->
  <path d="M 40.5 23 A 7.8 7.8 0 0 1 51.5 23" stroke="#a5f3fc" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Arc 2 -->
  <path d="M 37.5 19.5 A 12 12 0 0 1 54.5 19.5" stroke="#e0f2fe" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- Arc 3 -->
  <path d="M 34.5 16.5 A 16.5 16.5 0 0 1 57.5 16.5" stroke="#e0f2fe" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.35"/>
</svg>
